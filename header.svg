<svg width="100%" viewBox="0 0 900 60" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>KapuuZapuu GitHub profile header</title>
  <desc>A line of colored ASCII blocks with an RGB wave animation traveling left to right</desc>

  <defs>
    <style>
      @keyframes wave {
        0%   { stop-color: hsl(0,   100%, 60%); }
        17%  { stop-color: hsl(60,  100%, 60%); }
        33%  { stop-color: hsl(120, 100%, 60%); }
        50%  { stop-color: hsl(180, 100%, 60%); }
        67%  { stop-color: hsl(240, 100%, 60%); }
        83%  { stop-color: hsl(300, 100%, 60%); }
        100% { stop-color: hsl(360, 100%, 60%); }
      }
      .s0  { animation: wave 3s linear infinite; animation-delay:  0.00s; }
      .s1  { animation: wave 3s linear infinite; animation-delay: -2.88s; }
      .s2  { animation: wave 3s linear infinite; animation-delay: -2.76s; }
      .s3  { animation: wave 3s linear infinite; animation-delay: -2.64s; }
      .s4  { animation: wave 3s linear infinite; animation-delay: -2.52s; }
      .s5  { animation: wave 3s linear infinite; animation-delay: -2.40s; }
      .s6  { animation: wave 3s linear infinite; animation-delay: -2.28s; }
      .s7  { animation: wave 3s linear infinite; animation-delay: -2.16s; }
      .s8  { animation: wave 3s linear infinite; animation-delay: -2.04s; }
      .s9  { animation: wave 3s linear infinite; animation-delay: -1.92s; }
      .s10 { animation: wave 3s linear infinite; animation-delay: -1.80s; }
      .s11 { animation: wave 3s linear infinite; animation-delay: -1.68s; }
      .s12 { animation: wave 3s linear infinite; animation-delay: -1.56s; }
      .s13 { animation: wave 3s linear infinite; animation-delay: -1.44s; }
      .s14 { animation: wave 3s linear infinite; animation-delay: -1.32s; }
      .s15 { animation: wave 3s linear infinite; animation-delay: -1.20s; }
      .s16 { animation: wave 3s linear infinite; animation-delay: -1.08s; }
      .s17 { animation: wave 3s linear infinite; animation-delay: -0.96s; }
      .s18 { animation: wave 3s linear infinite; animation-delay: -0.84s; }
      .s19 { animation: wave 3s linear infinite; animation-delay: -0.72s; }
      .s20 { animation: wave 3s linear infinite; animation-delay: -0.60s; }
      .s21 { animation: wave 3s linear infinite; animation-delay: -0.48s; }
      .s22 { animation: wave 3s linear infinite; animation-delay: -0.36s; }
      .s23 { animation: wave 3s linear infinite; animation-delay: -0.24s; }
      .s24 { animation: wave 3s linear infinite; animation-delay: -0.12s; }
    </style>

    <linearGradient id="g0"  x1="0" y1="0" x2="0" y2="1"><stop class="s0"  offset="50%"/><stop class="s0"  offset="50%"/></linearGradient>
    <linearGradient id="g1"  x1="0" y1="0" x2="0" y2="1"><stop class="s1"  offset="50%"/><stop class="s1"  offset="50%"/></linearGradient>
    <linearGradient id="g2"  x1="0" y1="0" x2="0" y2="1"><stop class="s2"  offset="50%"/><stop class="s2"  offset="50%"/></linearGradient>
    <linearGradient id="g3"  x1="0" y1="0" x2="0" y2="1"><stop class="s3"  offset="50%"/><stop class="s3"  offset="50%"/></linearGradient>
    <linearGradient id="g4"  x1="0" y1="0" x2="0" y2="1"><stop class="s4"  offset="50%"/><stop class="s4"  offset="50%"/></linearGradient>
    <linearGradient id="g5"  x1="0" y1="0" x2="0" y2="1"><stop class="s5"  offset="50%"/><stop class="s5"  offset="50%"/></linearGradient>
    <linearGradient id="g6"  x1="0" y1="0" x2="0" y2="1"><stop class="s6"  offset="50%"/><stop class="s6"  offset="50%"/></linearGradient>
    <linearGradient id="g7"  x1="0" y1="0" x2="0" y2="1"><stop class="s7"  offset="50%"/><stop class="s7"  offset="50%"/></linearGradient>
    <linearGradient id="g8"  x1="0" y1="0" x2="0" y2="1"><stop class="s8"  offset="50%"/><stop class="s8"  offset="50%"/></linearGradient>
    <linearGradient id="g9"  x1="0" y1="0" x2="0" y2="1"><stop class="s9"  offset="50%"/><stop class="s9"  offset="50%"/></linearGradient>
    <linearGradient id="g10" x1="0" y1="0" x2="0" y2="1"><stop class="s10" offset="50%"/><stop class="s10" offset="50%"/></linearGradient>
    <linearGradient id="g11" x1="0" y1="0" x2="0" y2="1"><stop class="s11" offset="50%"/><stop class="s11" offset="50%"/></linearGradient>
    <linearGradient id="g12" x1="0" y1="0" x2="0" y2="1"><stop class="s12" offset="50%"/><stop class="s12" offset="50%"/></linearGradient>
    <linearGradient id="g13" x1="0" y1="0" x2="0" y2="1"><stop class="s13" offset="50%"/><stop class="s13" offset="50%"/></linearGradient>
    <linearGradient id="g14" x1="0" y1="0" x2="0" y2="1"><stop class="s14" offset="50%"/><stop class="s14" offset="50%"/></linearGradient>
    <linearGradient id="g15" x1="0" y1="0" x2="0" y2="1"><stop class="s15" offset="50%"/><stop class="s15" offset="50%"/></linearGradient>
    <linearGradient id="g16" x1="0" y1="0" x2="0" y2="1"><stop class="s16" offset="50%"/><stop class="s16" offset="50%"/></linearGradient>
    <linearGradient id="g17" x1="0" y1="0" x2="0" y2="1"><stop class="s17" offset="50%"/><stop class="s17" offset="50%"/></linearGradient>
    <linearGradient id="g18" x1="0" y1="0" x2="0" y2="1"><stop class="s18" offset="50%"/><stop class="s18" offset="50%"/></linearGradient>
    <linearGradient id="g19" x1="0" y1="0" x2="0" y2="1"><stop class="s19" offset="50%"/><stop class="s19" offset="50%"/></linearGradient>
    <linearGradient id="g20" x1="0" y1="0" x2="0" y2="1"><stop class="s20" offset="50%"/><stop class="s20" offset="50%"/></linearGradient>
    <linearGradient id="g21" x1="0" y1="0" x2="0" y2="1"><stop class="s21" offset="50%"/><stop class="s21" offset="50%"/></linearGradient>
    <linearGradient id="g22" x1="0" y1="0" x2="0" y2="1"><stop class="s22" offset="50%"/><stop class="s22" offset="50%"/></linearGradient>
    <linearGradient id="g23" x1="0" y1="0" x2="0" y2="1"><stop class="s23" offset="50%"/><stop class="s23" offset="50%"/></linearGradient>
    <linearGradient id="g24" x1="0" y1="0" x2="0" y2="1"><stop class="s24" offset="50%"/><stop class="s24" offset="50%"/></linearGradient>
  </defs>

  <!-- 25 rects, each 36px wide, 0px gap, starting at x=0 -->
  <rect x="0"   y="0" width="36" height="60" fill="url(#g0)"/>
  <rect x="36"  y="0" width="36" height="60" fill="url(#g1)"/>
  <rect x="72"  y="0" width="36" height="60" fill="url(#g2)"/>
  <rect x="108" y="0" width="36" height="60" fill="url(#g3)"/>
  <rect x="144" y="0" width="36" height="60" fill="url(#g4)"/>
  <rect x="180" y="0" width="36" height="60" fill="url(#g5)"/>
  <rect x="216" y="0" width="36" height="60" fill="url(#g6)"/>
  <rect x="252" y="0" width="36" height="60" fill="url(#g7)"/>
  <rect x="288" y="0" width="36" height="60" fill="url(#g8)"/>
  <rect x="324" y="0" width="36" height="60" fill="url(#g9)"/>
  <rect x="360" y="0" width="36" height="60" fill="url(#g10)"/>
  <rect x="396" y="0" width="36" height="60" fill="url(#g11)"/>
  <rect x="432" y="0" width="36" height="60" fill="url(#g12)"/>
  <rect x="468" y="0" width="36" height="60" fill="url(#g13)"/>
  <rect x="504" y="0" width="36" height="60" fill="url(#g14)"/>
  <rect x="540" y="0" width="36" height="60" fill="url(#g15)"/>
  <rect x="576" y="0" width="36" height="60" fill="url(#g16)"/>
  <rect x="612" y="0" width="36" height="60" fill="url(#g17)"/>
  <rect x="648" y="0" width="36" height="60" fill="url(#g18)"/>
  <rect x="684" y="0" width="36" height="60" fill="url(#g19)"/>
  <rect x="720" y="0" width="36" height="60" fill="url(#g20)"/>
  <rect x="756" y="0" width="36" height="60" fill="url(#g21)"/>
  <rect x="792" y="0" width="36" height="60" fill="url(#g22)"/>
  <rect x="828" y="0" width="36" height="60" fill="url(#g23)"/>
  <rect x="864" y="0" width="36" height="60" fill="url(#g24)"/>

</svg>
