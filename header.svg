<svg width="100%" viewBox="0 0 680 80" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>KapuuZapuu GitHub profile header</title>
  <desc>A line of ASCII block characters with an RGB wave animation traveling left to right</desc>

  <defs>
    <style>
      @keyframes wave {
        0%   { stop-color: hsl(0,   100%, 60%); }
        17%  { stop-color: hsl(60,  100%, 60%); }
        33%  { stop-color: hsl(120, 100%, 60%); }
        50%  { stop-color: hsl(180, 100%, 60%); }
        67%  { stop-color: hsl(240, 100%, 60%); }
        83%  { stop-color: hsl(300, 100%, 60%); }
        100% { stop-color: hsl(360, 100%, 60%); }
      }
 
      .s0  { animation: wave 3s linear infinite; animation-delay:  0.00s; }
      .s1  { animation: wave 3s linear infinite; animation-delay: -2.88s; }
      .s2  { animation: wave 3s linear infinite; animation-delay: -2.76s; }
      .s3  { animation: wave 3s linear infinite; animation-delay: -2.64s; }
      .s4  { animation: wave 3s linear infinite; animation-delay: -2.52s; }
      .s5  { animation: wave 3s linear infinite; animation-delay: -2.40s; }
      .s6  { animation: wave 3s linear infinite; animation-delay: -2.28s; }
      .s7  { animation: wave 3s linear infinite; animation-delay: -2.16s; }
      .s8  { animation: wave 3s linear infinite; animation-delay: -2.04s; }
      .s9  { animation: wave 3s linear infinite; animation-delay: -1.92s; }
      .s10 { animation: wave 3s linear infinite; animation-delay: -1.80s; }
      .s11 { animation: wave 3s linear infinite; animation-delay: -1.68s; }
      .s12 { animation: wave 3s linear infinite; animation-delay: -1.56s; }
      .s13 { animation: wave 3s linear infinite; animation-delay: -1.44s; }
      .s14 { animation: wave 3s linear infinite; animation-delay: -1.32s; }
      .s15 { animation: wave 3s linear infinite; animation-delay: -1.20s; }
      .s16 { animation: wave 3s linear infinite; animation-delay: -1.08s; }
      .s17 { animation: wave 3s linear infinite; animation-delay: -0.96s; }
      .s18 { animation: wave 3s linear infinite; animation-delay: -0.84s; }
      .s19 { animation: wave 3s linear infinite; animation-delay: -0.72s; }
      .s20 { animation: wave 3s linear infinite; animation-delay: -0.60s; }
      .s21 { animation: wave 3s linear infinite; animation-delay: -0.48s; }
      .s22 { animation: wave 3s linear infinite; animation-delay: -0.36s; }
      .s23 { animation: wave 3s linear infinite; animation-delay: -0.24s; }
      .s24 { animation: wave 3s linear infinite; animation-delay: -0.12s; }
    </style>
 
    <linearGradient id="g0"  x1="0" y1="0" x2="0" y2="1"><stop class="s0"  offset="50%"/><stop class="s0"  offset="50%"/></linearGradient>
    <linearGradient id="g1"  x1="0" y1="0" x2="0" y2="1"><stop class="s1"  offset="50%"/><stop class="s1"  offset="50%"/></linearGradient>
    <linearGradient id="g2"  x1="0" y1="0" x2="0" y2="1"><stop class="s2"  offset="50%"/><stop class="s2"  offset="50%"/></linearGradient>
